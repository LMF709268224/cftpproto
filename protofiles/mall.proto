  string candidate_ulid = 1;   // candidate ULID [required]
  string pipeline_cc_ulid = 2; // pipeline type ULID in gcc [required]
}

message CheckPipelineEligibilityResponse {
  // true = candidate can take a next action (unlock or purchase).
  // Frontend uses can_unlock / can_purchase to decide which button to show.
  bool eligible = 1;

  bool can_unlock = 2;                      // candidate can create an unlock order
  bool can_purchase = 3;                    // candidate can create a pipeline order
  repeated EligibilityBlocker blockers = 4; // ALL reasons blocking unlock/purchase (empty when eligible=true)
}

message EligibilityBlocker {
  // Machine-readable type for frontend handling.
  // Values: MISSING_UNLOCK_QUALIFICATION, MISSING_CERTS_QUALIFICATION,
  //         ALREADY_PURCHASED, IN_PROGRESS_PURCHASE, PIPELINE_NOT_FOUND
  string blocker_type = 1;

  // Human-readable description in English.
  string description = 2;

  // Specific missing items (e.g. qual names like ["CFtA Certification", "Work Experience Proof"]).
  repeated string details = 3;
}

// === Bundle Message Definitions ===

message CreateBundleRequest {
  string name = 1;
  string description = 2;
  string items_json = 3;
  string pricing_json = 4;
  string thumbnail_object_key = 5;
  string thumbnail_file_hash = 6;
  string bundle_gpath = 7; // GPath (业务唯一路径) [required]
}

message CreateBundleResponse {
  string bundle_id = 1;
  string bundle_gpath = 2;
  uint32 version = 3;
}

message UpdateBundleMetaRequest {
  string bundle_id = 1;
  optional string name = 2;
  optional string description = 3;
  optional string thumbnail_object_key = 4;
  optional string thumbnail_file_hash = 5;
  optional string status = 6;
  optional bool is_current = 7;
}

message UpdateBundlePricingRequest {
  string bundle_gpath = 1;
  string pricing_json = 2;
  string items_json = 3;
}

message UpdateBundleResponse {
  string bundle_id = 1;
  string bundle_gpath = 2;
  uint32 version = 3;
}

message GetBundleRequest {
  oneof query {
    string bundle_id = 1;
    string bundle_gpath = 2;
  }
}

message GetBundleResponse {
  BundleInfo bundle = 1;
}

message ListBundlesRequest {
  int32 limit = 1;
  int32 offset = 2;
  string status = 3;
}

message ListBundlesResponse {
  repeated BundleInfo bundles = 1;
  int32 total = 2;
}

message BundleInfo {
  string bundle_id = 1;
  string bundle_gpath = 2;
  uint32 version = 3;
  string name = 4;
  string description = 5;
  string items_json = 6;
  string pricing_json = 7;
  string thumbnail_object_key = 8;
  string thumbnail_file_hash = 9;
  string status = 10;
  bool is_current = 11;
  string created_at = 12;
  string updated_at = 13;
}

message CreateBundleOrderRequest {
  string candidate_ulid = 1;
  string bundle_id = 2;
  string payment_mode = 3;
  string selected_exemptions_json = 4;
}

message CreateBundleOrderResponse {
  string bundle_order_ulid = 1;
  string order_status = 2;
  string bundle_pay_order_ulid = 3;
  string payment_key = 4;
  bool reused_existing = 5;
  string message = 6;
}

message GetBundleOrderSummaryRequest {
  string bundle_order_ulid = 1;
}

message GetBundleOrderSummaryResponse {
  bool found = 1;
  BundleOrderSummary summary = 2;
}

message GetBundleOrderDetailRequest {
  string bundle_order_ulid = 1;
}

message GetBundleOrderDetailResponse {
  bool found = 1;
  BundleOrderDetail detail = 2;
}

message ListBundleOrdersRequest {
  string candidate_ulid = 1;
  string bundle_id = 2;
  string order_status = 3;
  int32 limit = 4;
  int32 offset = 5;
}

message ListBundleOrdersResponse {
  repeated BundleOrderSummary items = 1;
  int32 total = 2;
}

message BundleOrderSummary {
  string bundle_order_ulid = 1;
  string candidate_ulid = 2;
  string bundle_id = 3;
  string payment_mode = 4;
  string order_status = 5;
  string created_at = 6;
  string bundle_pay_order_ulid = 7;
}

message BundleOrderDetail {
  BundleOrderSummary summary = 1;
  string status_at = 2;
  string items_snapshot_json = 3;
  string pricing_snapshot_json = 4;
  string completed_at = 5;
  string completed_reason = 6;
  string updated_at = 7;
}

message AdminPurgeCandidateBundleRequest {
  string candidate_ulid = 1;      // candidate ULID [required]
  string bundle_order_ulid = 2;   // bundle order ULID [required]
  string admin_id = 3;            // admin user ID [required]
}

message AdminPurgeCandidateBundleResponse {
  bool success = 1;
  string message = 2;
}

message CreateBundleUploadURLRequest {
  string file_name = 1;        // Filename (e.g. thumbnail.png) [required]
  string content_type = 2;     // MIME type [required]
  string bundle_id = 3;        // Bundle ULID [required]
  string file_hash = 4;        // SHA256 checksum [required]
}

message CreateBundleUploadURLResponse {
  string bucket_name = 1;      // S3 bucket name
  string object_key = 2;       // Object key (e.g. bundles/<bundle_id>/thumbnail/thumbnail.png)
  string upload_url = 3;       // Pre-signed S3 upload URL
  string expires_at = 4;       // Expiry timestamp (RFC3339)
  map<string, string> signed_headers = 5; // Extra headers to include during upload
}

message GetBundleThumbnailURLRequest {
  string bundle_id = 1;        // Bundle ULID [required]
}

message GetBundleThumbnailURLResponse {
  string public_url = 1;       // Publicly accessible URL for the bundle thumbnail
}


