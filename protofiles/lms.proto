  string file_object_key = 5;    // 文件S3对象key
  uint64 file_size = 6;          // 文件大小（字节）
  uint32 sort_order = 7;         // 排序序号
  uint32 version = 8;            // 乐观锁版本号
  string created_at = 9;        // 创建时间 (UTC, RFC3339)
  string updated_at = 10;        // 更新时间 (UTC, RFC3339)
  string file_hash = 11;         // 资料文件SHA256哈希
}

message ChapterSummary {
  string chapter_id = 1;  // 章节唯一ID (ULID)
  string course_id = 2;   // 所属课程ID
  string title = 3;       // 章节标题
  uint32 sort_order = 4;  // 排序序号
  uint32 version = 5;     // 乐观锁版本号
  string created_at = 6;  // 创建时间
  string updated_at = 7;  // 更新时间
}

message LessonSummary {
  string lesson_id = 1;         // 课时唯一ID (ULID)
  string chapter_id = 2;        // 所属章节ID
  string title = 3;             // 课时标题
  uint32 sort_order = 4;        // 排序序号
  LessonType lesson_type = 5;   // 课时类型
  string media_object_key = 6;  // 媒体文件S3对象key
  string external_url = 7;      // 外部链接URL
  string video_provider = 8;    // 视频提供商
  string video_stream_uid = 9;  // 视频流在提供商平台的唯一标识
  uint32 version = 10;          // 乐观锁版本号
  string created_at = 11;       // 创建时间 (UTC, RFC3339)
  string updated_at = 12;       // 更新时间 (UTC, RFC3339)
  string media_file_hash = 13;  // 媒体文件SHA256哈希
  string chapter_title = 14;    // 所属章节标题
}

message PrerequisiteSummary {
  string prerequisite_id = 1;            // 前置条件唯一ID (ULID)
  EntityType required_entity_type = 2;   // 前置实体类型
  string required_entity_id = 3;         // 前置实体ID
  PrerequisiteResult required_result = 4; // 前置要求结果
  EntityType target_entity_type = 5;     // 目标实体类型
  string target_entity_id = 6;           // 目标实体ID
  uint32 version = 7;                    // 乐观锁版本号
  string created_at = 8;                 // 创建时间
  string updated_at = 9;                 // 更新时间
}

message QuizSummary {
  reserved 7, 8;
  string quiz_id = 1;                // 测验唯一ID (ULID)
  QuizzableType quizzable_type = 2;  // 所属实体类型
  string quizzable_id = 3;           // 所属实体ID
  string title = 4;                  // 测验标题
  uint32 passing_score = 5;          // 及格分数
  uint32 time_limit = 6;             // 时间限制
  // uint32 max_attempts = 7;           // 最大尝试次数 (removed)
  // bool allow_retake = 8;             // 是否允许通过后重考 (removed)
  bool randomize_questions = 9;      // 是否随机排列题目顺序
  uint32 version = 11;               // 乐观锁版本号
  string created_at = 12;            // 创建时间
  string updated_at = 13;            // 更新时间
}

message QuizQuestionSummary {
  string question_id = 1;            // 题目唯一ID (ULID)
  string quiz_id = 2;                // 所属测验ID
  QuizQuestionType question_type = 3; // 题目类型
