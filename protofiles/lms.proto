  UploadType upload_type = 1; // 上传类型，决定S3路径和校验规则 ([required])
  string file_name = 2;       // 文件名 ([required])
  string content_type = 3;    // 文件MIME类型 ([required])
  string course_id = 4;       // 课程ID ([required])
  string chapter_id = 5;      // 章节ID（上传课时素材时必填）
  string material_id = 6;     // 资料ID（上传课程资料时必填）
  string lesson_id = 7;       // 课时ID（上传课时素材时必填）
  string quiz_id = 8;         // 测验ID（上传测验素材时必填）
  string file_hash = 9;       // 文件SHA256哈希 ([required])
  string pack_id = 10;                // 资源包ID（上传资源包封面图/文件时必填）
  string resource_pack_file_id = 11;  // 资源包文件ID（上传资源包文件时必填）
}

message CreateUploadURLResponse {
  string bucket_name = 1; // 存储桶名称
  string object_key = 2;  // 对象key（上传时需使用此key）
  string upload_url = 3;  // 预签名上传URL（15分钟有效）
  string expires_at = 4;  // URL过期时间 (UTC, RFC3339)
  map<string, string> signed_headers = 5; // 预签名上传需要附带的 HTTP Header
}

