  string course_title = 3;      // 课程标题（辅助前端呈现）
  string status = 4;            // 学习状态：learning/completed
  uint32 progress_percentage = 5; // 学习进度百分比（动态计算）
  string joined_at = 6;         // 加入时间 (UTC, RFC3339)
  string completed_at = 7;      // 完成时间 (UTC, RFC3339)
}

message ListCandidateEnrollmentsResponse {
  repeated CandidateEnrollmentSummary enrollments = 1; // 选课记录列表
  string next_page_token = 2;                          // 下一页游标
}

message GetCandidateEnrollmentDetailRequest {
  string enrollment_id = 1; // 选课记录ID
  string candidate_id = 2;  // 考生ID (BFF 传入校验所有权)
}

message GetCandidateEnrollmentDetailResponse {
  string enrollment_id = 1;             // 选课记录ID
  string candidate_id = 2;              // 考生ID
  string course_id = 3;                 // 课程版本ID
  string status = 4;                    // 学习状态
  uint32 progress_percentage = 5;       // 学习进度百分比
  uint32 total_lessons = 6;             // 课程总课时数
  uint32 completed_lessons = 7;         // 已完成课时数
  repeated string completed_lesson_ids = 8; // 已完成课时ID列表
  uint32 total_quizzes = 9;             // 课程总测验数
  uint32 passed_quizzes = 10;           // 已通过测验数
  repeated string passed_quiz_ids = 11; // 已通过测验ID列表
  string joined_at = 12;                // 加入时间 (UTC, RFC3339)
  string completed_at = 13;             // 完成时间 (UTC, RFC3339)
}

message ListCourseEnrollmentsForAdminRequest {
  string course_id = 1;  // 课程版本ID ([required])
  string status = 2;     // 状态过滤 ([required])
  uint32 page_size = 3;  // 每页数量
  string page_token = 4; // 分页游标
}

message CourseEnrollmentSummaryForAdmin {
  string enrollment_id = 1;     // 选课记录ID
  string candidate_id = 2;      // 考生ID
  string status = 3;            // 学习状态
  uint32 progress_percentage = 4; // 学习进度百分比（动态计算）
  string joined_at = 5;         // 加入时间 (UTC, RFC3339)
  string completed_at = 6;      // 完成时间 (UTC, RFC3339)
}

message ListCourseEnrollmentsForAdminResponse {
  repeated CourseEnrollmentSummaryForAdmin enrollments = 1; // 选课记录列表
  string next_page_token = 2;                               // 下一页游标
}

message GetCandidateProgressForAdminRequest {
  string candidate_id = 1; // 考生ID ([required])
  string course_id = 2;    // 课程版本ID ([required])
}

message GetCandidateProgressForAdminResponse {
  string enrollment_id = 1;             // 选课记录ID
  string candidate_id = 2;              // 考生ID
  string course_id = 3;                 // 课程版本ID
  string status = 4;                    // 学习状态
  uint32 progress_percentage = 5;       // 学习进度百分比
  repeated string completed_lesson_ids = 6; // 已完成课时ID列表
  repeated string passed_quiz_ids = 7;  // 已通过测验ID列表
  string joined_at = 8;                 // 加入时间 (UTC, RFC3339)
  string completed_at = 9;              // 完成时间 (UTC, RFC3339)
}

// ==================== 完整课程树形结构（用于考生端展示） ====================

message QuizOptionDetail {
  QuizOption option = 1; // 选项详情
}

message QuizQuestionDetail {
  QuizQuestion question = 1;     // 题目详情
  repeated QuizOption options = 2; // 题目下的所有选项
}

message QuizDetail {
  Quiz quiz = 1;                       // 测验详情
  repeated QuizQuestionDetail questions = 2; // 测验下的所有题目（含选项）
}

message LessonDetail {
  Lesson lesson = 1;               // 课时详情
  repeated QuizDetail quizzes = 2; // 课时下的所有测验
}

message ChapterDetail {
  Chapter chapter = 1;               // 章节详情
  repeated LessonDetail lessons = 2; // 章节下的所有课时（含测验）
  repeated QuizDetail quizzes = 3;   // 章节下的所有测验（章末测试）
}

message CompleteCourse {
  Course course = 1;                    // 课程详情
  repeated CourseMaterial materials = 2; // 课程资料列表
  repeated ChapterDetail chapters = 3;  // 章节列表（含课时、测验的完整树）
  repeated QuizDetail quizzes = 4;      // 课程级测验列表（期末考试）
  SupplementaryMaterial supplementary_material = 5; // 辅助资料（外部链接等补充资源）
}

message SupplementaryMaterial {
  string material_id = 1;
  string course_id = 2;
  string kind = 3;           // 资料种类标识，由客户端定义（如 "cfta_supplementary"），不能为空
  string data_json = 4;      // 任意 JSON 结构，服务端不解析，透传给前端
  uint32 version = 5;
  string created_at = 6;
  string updated_at = 7;
}

message GetCompleteCourseRequest {
  string course_id = 1; // 课程版本ID ([required])
}

message GetCompleteCourseResponse {
  CompleteCourse complete_course = 1; // 完整课程树形结构
}

// ==================== 辅助资料 RPC messages ====================

message CreateCourseSupplementaryMaterialRequest {
  string material_id = 1;  // ULID (required, externally assigned)
  string course_id = 2;    // course ID (required)
  string kind = 3;         // 资料种类标识 (required, non-empty)
  string data_json = 4;    // JSON 内容 (required)
}

message CreateCourseSupplementaryMaterialResponse {
  SupplementaryMaterial material = 1;
}

message UpdateCourseSupplementaryMaterialRequest {
  string material_id = 1;  // material ID (required)
  string kind = 2;         // 资料种类标识 (required, non-empty)
  string data_json = 3;    // JSON 内容 (required)
  uint32 version = 4;      // optimistic lock (required)
}

message UpdateCourseSupplementaryMaterialResponse {
  SupplementaryMaterial material = 1;
}

message DeleteCourseSupplementaryMaterialRequest {
  string material_id = 1;  // material ID (required)
  uint32 version = 2;      // optimistic lock (required)
}

message DeleteCourseSupplementaryMaterialResponse {
  bool success = 1;
}

message GetCourseSupplementaryMaterialRequest {
  string course_id = 1;  // course ID (required)
}

message GetCourseSupplementaryMaterialResponse {
  SupplementaryMaterial material = 1;
}

// ==================== 考生答题 RPC messages ====================

message TakeQuizRequest {
  string candidate_id = 1; // 考生ID ([required])
  string quiz_id = 2;      // 测验ID ([required])
}

message TakeQuizResponse {
  string attempt_id = 1; // 答题记录ID
  string status = 2;     // 答题状态：in_progress(进行中)
}

message QuizOptionForCandidate {
  string option_id = 1;  // 选项ID
  string option_text = 2; // 选项内容（不包含is_correct，考生不可见正确答案）
  uint32 sort_order = 3;  // 排序序号
}

message QuizQuestionForCandidate {
  string question_id = 1;                  // 题目ID
  string question_text = 2;                // 题目内容
  QuizQuestionType question_type = 3;      // 题目类型
  uint32 points = 4;                       // 分值
  uint32 sort_order = 5;                   // 排序序号
  repeated QuizOptionForCandidate options = 6; // 选项列表（不含正确答案标记）
}

message GetCandidateQuizPaperRequest {
  string candidate_id = 1; // 考生ID ([required])
  string attempt_id = 2;   // 答题记录ID ([required])
}

message GetCandidateQuizPaperResponse {
  string attempt_id = 1;                       // 答题记录ID
  string quiz_id = 2;                          // 测验ID
  string title = 3;                            // 测验标题
  string description = 4;                      // 测验说明
  uint32 time_limit = 5;                       // 时间限制（分钟）
  repeated QuizQuestionForCandidate questions = 6; // 题目列表（不含正确答案）
}

message QuizAnswerSubmission {
  string question_id = 1;           // 题目ID ([required])
  repeated string selected_option_ids = 2; // 考生选择的选项ID列表（单选为1个，多选可多个）
}

message SubmitQuizRequest {
  string candidate_id = 1;                   // 考生ID ([required])
  string attempt_id = 2;                     // 答题记录ID ([required])
  repeated QuizAnswerSubmission submissions = 3; // 考生作答提交列表 ([required])
}

message SubmitQuizResponse {
  string attempt_id = 1;   // 答题记录ID
  string status = 2;       // 答题状态：completed(已完成)
  uint32 score = 3;        // 实际得分
  uint32 max_score = 4;    // 满分
  bool is_passed = 5;      // 是否及格（score/max_score >= passing_score%）
  string completed_at = 6; // 完成时间 (UTC, RFC3339)
  bool course_completed = 7; // 是否触发了课程结业
  string course_status = 8;  // 课程状态：learning(学习中)/completed(已完成)
}

// ==================== 已损坏资产（管理员排查用） ====================

message BrokenAssetDetail {
  string object_key = 1;    // S3对象key
  string asset_type = 2;    // 资产类型：thumbnail(封面)/material(资料)/lesson(课时素材)
  string status = 3;        // 资产状态：pending(待检查)/active(正常)/broken(已损坏)
  string error_message = 4; // 错误详情（status=broken时）
  string reconciled_at = 5; // 最后对账时间 (UTC, RFC3339)
  string created_at = 6;    // 创建时间 (UTC, RFC3339)
  string updated_at = 7;    // 更新时间 (UTC, RFC3339)
  string file_hash = 16;    // 资产文件SHA256哈希

  // 关联上下文信息（方便快速定位问题）
  string course_id = 8;     // 所属课程ID
  string course_title = 9;  // 所属课程标题
  string chapter_id = 10;   // 所属章节ID
  string chapter_title = 11; // 所属章节标题
  string lesson_id = 12;    // 所属课时ID
  string lesson_title = 13; // 所属课时标题
  string material_id = 14;  // 所属资料ID
  string material_title = 15; // 所属资料标题
}

message ListBrokenAssetsRequest {
  uint32 page_size = 1;  // 每页数量
  string page_token = 2; // 分页游标
  string asset_type = 3; // 资产类型过滤：thumbnail/material/lesson
}

message ListBrokenAssetsResponse {
  repeated BrokenAssetDetail assets = 1; // 已损坏资产列表
  string next_page_token = 2;            // 下一页游标
}

// 批量导入测验请求，quiz_json 包含完整的测验、题目和选项
message ImportQuizRequest {
  QuizzableType quizzable_type = 1; // 挂载到 course / chapter / lesson [required]
  string quizzable_id = 2;          // 目标实体 ID [required]
  string quiz_json = 3;             // 完整测验 JSON 字符串 [required]
}

message ImportQuizResponse {
  string quiz_id = 1;       // 生成的测验 ID (ULID)
  int32 question_count = 2; // 创建的题目数量
  int32 option_count = 3;   // 创建的选项数量
}

// 批量导入课程请求，course_json 包含章节、课时、资料（不含测验）
message ImportCourseRequest {
  string category_tips = 1;  // 分类提示，客户端按相同值分组展示，最长64字符 [optional]
  string course_json = 2;  // 完整课程 JSON 字符串 [required]
}

message ImportCourseResponse {
  string course_id = 1;     // 生成的课程 ID (ULID)
  string course_gpath = 2;   // 生成的课程业务唯一路径
  int32 chapter_count = 3;  // 创建的章节数量
  int32 lesson_count = 4;   // 创建的课时数量
  int32 material_count = 5; // 创建的资料数量
}

// ==================== 新增的详细信息与摘要相关实体与消息 ====================

message GetCourseSummaryResponse {
  CourseSummary course = 1;
}

message CourseSummary {
  string course_id = 1;             // 课程版本唯一ID (ULID)，每次编辑生成新ID
  string category_tips = 2;         // 分类提示，最长64字符
  string title = 3;                 // 课程标题
  string thumbnail_object_key = 4;  // 课程封面图S3对象key
  uint32 duration_min = 5;          // 课程总时长（分钟）
