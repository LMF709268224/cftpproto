message InitiatePaymentRequest {
  string biz_type = 1;      // PIPELINE_PAYMENT, STAGE_PAYMENT, COURSE_RETAKE_PAYMENT, PIPELINE_UNLOCK, CREDENTIAL_APPLICATION, BUNDLE_PURCHASE
  string biz_ref_ulid = 2;  // pipeline/stage/course retake order ULID
  string success_url = 3;
  string cancel_url = 4;
  repeated string coupon_codes = 5; // Stripe coupon codes to apply [optional]
}

message InitiatePaymentResponse {
  string payment_key = 1;
  string pay_order_ulid = 2;
  string message = 3;
}

message PreviewPaymentRequest {
  string biz_type = 1;      // PIPELINE_PAYMENT, STAGE_PAYMENT, COURSE_RETAKE_PAYMENT, PIPELINE_UNLOCK, CREDENTIAL_APPLICATION, BUNDLE_PURCHASE
  string biz_ref_ulid = 2;  // pipeline/stage/course retake order ULID
  repeated string coupon_codes = 3; // Coupon codes to preview
}

message PreviewPaymentResponse {
  int64 subtotal = 1;         // Original total in cents
  int64 discount_total = 2;   // Total discount in cents
  int64 tax_total = 3;        // Total tax in cents
  int64 total = 4;            // Final total in cents
  string currency = 5;        // Currency code
  repeated CouponDiscount breakdown = 6; // Details of applied coupons
  repeated InvalidCoupon invalid = 7;     // Details of invalid coupons
}

message CouponDiscount {
  string code = 1;
  string name = 2;
  string type = 3;            // "percentage" / "fixed_amount"
  double percent_off = 4;
  int64 amount_off = 5;
  int64 discount = 6;
  string description = 7;
}

message InvalidCoupon {
  string code = 1;
  string reason = 2;
}


