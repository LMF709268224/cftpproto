syntax = "proto3";

package glms;

option go_package = "cftp/glms";

// 课程资料类型
enum MaterialType {
  MATERIAL_TYPE_UNSPECIFIED = 0; // 未指定
  MATERIAL_TYPE_TEXTBOOK = 1;    // 教材/课本
  MATERIAL_TYPE_SLIDES = 2;      // 幻灯片/课件
  MATERIAL_TYPE_REFERENCE = 3;   // 参考资料
  MATERIAL_TYPE_OTHER = 4;       // 其他
}

// 课时内容类型
enum LessonType {
  LESSON_TYPE_UNSPECIFIED = 0; // 未指定
  LESSON_TYPE_VIDEO = 1;       // 视频
  LESSON_TYPE_TEXT = 2;        // 文本
  LESSON_TYPE_PDF = 3;         // PDF文档
  LESSON_TYPE_IMAGE = 4;       // 图片
  LESSON_TYPE_AUDIO = 5;       // 音频
  LESSON_TYPE_FILE = 6;        // 文件
  LESSON_TYPE_LINK = 7;        // 外部链接
}

// 学习实体类型（用于前置条件系统）
enum EntityType {
  ENTITY_TYPE_UNSPECIFIED = 0; // 未指定
  ENTITY_TYPE_LESSON = 1;      // 课时
  ENTITY_TYPE_QUIZ = 2;        // 测验
  ENTITY_TYPE_CHAPTER = 3;     // 章节
  ENTITY_TYPE_COURSE = 4;      // 课程
}

// 前置条件满足结果
enum PrerequisiteResult {
  PREREQUISITE_RESULT_UNSPECIFIED = 0; // 未指定
  PREREQUISITE_RESULT_COMPLETED = 1;   // 已完成（适用于课时/章节/课程）
  PREREQUISITE_RESULT_PASSED = 2;      // 已通过（适用于测验）
}

// 测验所属实体类型
enum QuizzableType {
  QUIZZABLE_TYPE_UNSPECIFIED = 0; // 未指定
  QUIZZABLE_TYPE_LESSON = 1;      // 课时级测验
  QUIZZABLE_TYPE_CHAPTER = 2;     // 章节级测验（章末测试）
  QUIZZABLE_TYPE_COURSE = 3;      // 课程级测验（期末考试）
}

// 测验题目类型
enum QuizQuestionType {
  QUIZ_QUESTION_TYPE_UNSPECIFIED = 0;   // 未指定
  QUIZ_QUESTION_TYPE_SINGLE_CHOICE = 1; // 单选题
  QUIZ_QUESTION_TYPE_MULTIPLE_CHOICE = 2; // 多选题
  QUIZ_QUESTION_TYPE_TRUE_FALSE = 3;    // 判断题
}

// 资源包文件类型
enum ResourcePackFileType {
  RESOURCE_PACK_FILE_TYPE_UNSPECIFIED = 0; // 未指定
  RESOURCE_PACK_FILE_TYPE_VIDEO = 1;       // 视频
  RESOURCE_PACK_FILE_TYPE_PDF = 2;         // PDF文档
  RESOURCE_PACK_FILE_TYPE_ZIP = 3;         // ZIP压缩包
}

// 上传类型（决定S3存储路径和校验规则）
enum UploadType {
  UPLOAD_TYPE_UNSPECIFIED = 0;       // 未指定
  UPLOAD_TYPE_COURSE_THUMBNAIL = 1;  // 课程封面图
  UPLOAD_TYPE_COURSE_MATERIAL = 2;   // 课程资料文件
  UPLOAD_TYPE_LESSON_ASSET = 3;      // 课时素材文件
  UPLOAD_TYPE_QUIZ_ASSET = 4;        // 测验素材文件
  UPLOAD_TYPE_RESOURCE_PACK_THUMBNAIL = 5;  // 资源包封面图
  UPLOAD_TYPE_RESOURCE_PACK_FILE = 6;       // 资源包文件
}


service LmsService {
  // ==========================================
  // 1. 管理端 & 内部微服务调用接口 (Admin & Internal Services - Suffixed with Admin)
  // ==========================================
  rpc CreateCourseDraftAdmin(CreateCourseDraftRequest) returns (Course);
  rpc DuplicateCourseDraftAdmin(DuplicateCourseDraftRequest) returns (Course);
  rpc UpdateCourseAdmin(UpdateCourseRequest) returns (UpdateCourseResponse);
  rpc DeleteCourseAdmin(DeleteCourseRequest) returns (DeleteCourseResponse);
  rpc PublishCourseAdmin(PublishCourseRequest) returns (PublishCourseResponse);
  rpc GetCourseSummaryAdmin(GetCourseRequest) returns (GetCourseSummaryResponse);
  rpc GetCourseDetailAdmin(GetCourseDetailRequest) returns (GetCourseDetailResponse);
  rpc ListCoursesAdmin(ListCoursesRequest) returns (ListCoursesResponse);

  rpc CreateCourseMaterialAdmin(CreateCourseMaterialRequest) returns (CreateCourseMaterialResponse);
  rpc UpdateCourseMaterialAdmin(UpdateCourseMaterialRequest) returns (UpdateCourseMaterialResponse);
  rpc DeleteCourseMaterialAdmin(DeleteCourseMaterialRequest) returns (DeleteCourseMaterialResponse);
  rpc GetCourseMaterialAdmin(GetCourseMaterialRequest) returns (GetCourseMaterialResponse);
  rpc GetCourseMaterialDetailAdmin(GetCourseMaterialRequest) returns (GetCourseMaterialDetailResponse);
  rpc ListCourseMaterialsAdmin(ListCourseMaterialsRequest) returns (ListCourseMaterialsResponse);
  rpc ReorderCourseMaterialsAdmin(ReorderCourseMaterialsRequest) returns (ReorderCourseMaterialsResponse);

  rpc CreateChapterAdmin(CreateChapterRequest) returns (CreateChapterResponse);
  rpc UpdateChapterAdmin(UpdateChapterRequest) returns (UpdateChapterResponse);
  rpc DeleteChapterAdmin(DeleteChapterRequest) returns (DeleteChapterResponse);
  rpc GetChapterAdmin(GetChapterRequest) returns (GetChapterResponse);
  rpc GetChapterDetailAdmin(GetChapterRequest) returns (GetChapterDetailResponse);
  rpc ListChaptersAdmin(ListChaptersRequest) returns (ListChaptersResponse);
  rpc ReorderChaptersAdmin(ReorderChaptersRequest) returns (ReorderChaptersResponse);

  rpc CreateLessonAdmin(CreateLessonRequest) returns (CreateLessonResponse);
  rpc UpdateLessonAdmin(UpdateLessonRequest) returns (UpdateLessonResponse);
  rpc DeleteLessonAdmin(DeleteLessonRequest) returns (DeleteLessonResponse);
  rpc GetLessonAdmin(GetLessonRequest) returns (GetLessonResponse);
  rpc GetLessonDetailAdmin(GetLessonRequest) returns (GetLessonDetailResponse);
  rpc ListLessonsAdmin(ListLessonsRequest) returns (ListLessonsResponse);
  rpc ReorderLessonsAdmin(ReorderLessonsRequest) returns (ReorderLessonsResponse);
  rpc ListLessonsByCourseAdmin(ListLessonsByCourseRequest) returns (ListLessonsByCourseResponse);

  rpc CreatePrerequisiteAdmin(CreatePrerequisiteRequest) returns (CreatePrerequisiteResponse);
  rpc UpdatePrerequisiteAdmin(UpdatePrerequisiteRequest) returns (UpdatePrerequisiteResponse);
  rpc DeletePrerequisiteAdmin(DeletePrerequisiteRequest) returns (DeletePrerequisiteResponse);
  rpc GetPrerequisiteAdmin(GetPrerequisiteRequest) returns (GetPrerequisiteResponse);
  rpc GetPrerequisiteDetailAdmin(GetPrerequisiteRequest) returns (GetPrerequisiteDetailResponse);
  rpc ListPrerequisitesAdmin(ListPrerequisitesRequest) returns (ListPrerequisitesResponse);
  rpc ListPrerequisitesByRequiredEntityAdmin(ListPrerequisitesByRequiredEntityRequest) returns (ListPrerequisitesByRequiredEntityResponse);

  rpc CreateQuizAdmin(CreateQuizRequest) returns (CreateQuizResponse);
  rpc UpdateQuizAdmin(UpdateQuizRequest) returns (UpdateQuizResponse);
  rpc DeleteQuizAdmin(DeleteQuizRequest) returns (DeleteQuizResponse);
  rpc GetQuizAdmin(GetQuizRequest) returns (GetQuizResponse);
  rpc GetQuizDetailAdmin(GetQuizDetailRequest) returns (GetQuizDetailResponse);
  rpc ListQuizzesAdmin(ListQuizzesRequest) returns (ListQuizzesResponse);

  rpc CreateQuizQuestionAdmin(CreateQuizQuestionRequest) returns (CreateQuizQuestionResponse);
  rpc UpdateQuizQuestionAdmin(UpdateQuizQuestionRequest) returns (UpdateQuizQuestionResponse);
  rpc DeleteQuizQuestionAdmin(DeleteQuizQuestionRequest) returns (DeleteQuizQuestionResponse);
  rpc GetQuizQuestionAdmin(GetQuizQuestionRequest) returns (GetQuizQuestionResponse);
  rpc GetQuizQuestionDetailAdmin(GetQuizQuestionRequest) returns (GetQuizQuestionDetailResponse);
  rpc ListQuizQuestionsAdmin(ListQuizQuestionsRequest) returns (ListQuizQuestionsResponse);
  rpc ReorderQuizQuestionsAdmin(ReorderQuizQuestionsRequest) returns (ReorderQuizQuestionsResponse);

  rpc CreateQuizOptionAdmin(CreateQuizOptionRequest) returns (CreateQuizOptionResponse);
  rpc UpdateQuizOptionAdmin(UpdateQuizOptionRequest) returns (UpdateQuizOptionResponse);
  rpc DeleteQuizOptionAdmin(DeleteQuizOptionRequest) returns (DeleteQuizOptionResponse);
  rpc GetQuizOptionAdmin(GetQuizOptionRequest) returns (GetQuizOptionResponse);
  rpc GetQuizOptionDetailAdmin(GetQuizOptionRequest) returns (GetQuizOptionDetailResponse);
  rpc ListQuizOptionsAdmin(ListQuizOptionsRequest) returns (ListQuizOptionsResponse);
  rpc ReorderQuizOptionsAdmin(ReorderQuizOptionsRequest) returns (ReorderQuizOptionsResponse);

  rpc ImportQuizAdmin(ImportQuizRequest) returns (ImportQuizResponse);
  rpc ImportCourseAdmin(ImportCourseRequest) returns (ImportCourseResponse);
  rpc ListObjectsAdmin(ListObjectsRequest) returns (ListObjectsResponse);
  rpc CreateUploadURLAdmin(CreateUploadURLRequest) returns (CreateUploadURLResponse);
  rpc ListBrokenAssetsAdmin(ListBrokenAssetsRequest) returns (ListBrokenAssetsResponse);

  rpc EnrollCandidateCourseAdmin(EnrollCandidateCourseRequest) returns (EnrollCandidateCourseResponse);
  rpc BatchEnrollCandidateCoursesAdmin(BatchEnrollCandidateCoursesRequest) returns (BatchEnrollCandidateCoursesResponse);
  rpc GrantCourseAccessPermissionAdmin(GrantCourseAccessPermissionAdminRequest) returns (GrantCourseAccessPermissionAdminResponse);
  rpc RevokeCourseAccessPermissionAdmin(RevokeCourseAccessPermissionAdminRequest) returns (RevokeCourseAccessPermissionAdminResponse);

  rpc ListLessonProgressAdmin(ListLessonProgressRequest) returns (ListLessonProgressResponse);
  rpc GetLessonProgressDetailAdmin(GetLessonProgressDetailRequest) returns (GetLessonProgressDetailResponse);
  rpc ListQuizAttemptsAdmin(ListQuizAttemptsRequest) returns (ListQuizAttemptsResponse);
  rpc GetQuizAttemptDetailAdmin(GetQuizAttemptDetailRequest) returns (GetQuizAttemptDetailResponse);
  rpc ListChapterProgressAdmin(ListChapterProgressRequest) returns (ListChapterProgressResponse);
  rpc GetChapterProgressDetailAdmin(GetChapterProgressDetailRequest) returns (GetChapterProgressDetailResponse);
  rpc ListCourseAssetsAdmin(ListCourseAssetsRequest) returns (ListCourseAssetsResponse);
  rpc GetCourseAssetDetailAdmin(GetCourseAssetDetailRequest) returns (GetCourseAssetDetailResponse);
  rpc ListCourseEnrollmentsAdmin(ListCourseEnrollmentsRequest) returns (ListCourseEnrollmentsResponse);
  rpc GetCourseEnrollmentDetailAdmin(GetCourseEnrollmentDetailRequest) returns (GetCourseEnrollmentDetailResponse);
  rpc ListCourseEnrollmentsForAdmin(ListCourseEnrollmentsForAdminRequest) returns (ListCourseEnrollmentsForAdminResponse);
  rpc GetCandidateProgressForAdmin(GetCandidateProgressForAdminRequest) returns (GetCandidateProgressForAdminResponse);
  rpc SyncCourseProgressAdmin(SyncCourseProgressRequest) returns (SyncCourseProgressResponse);
  rpc GetCompleteCourseAdmin(GetCompleteCourseRequest) returns (GetCompleteCourseResponse);
  rpc CreateViewURLAdmin(CreateViewURLRequest) returns (CreateViewURLResponse);

  rpc CreateCourseSupplementaryMaterialAdmin(CreateCourseSupplementaryMaterialRequest) returns (CreateCourseSupplementaryMaterialResponse);
  rpc UpdateCourseSupplementaryMaterialAdmin(UpdateCourseSupplementaryMaterialRequest) returns (UpdateCourseSupplementaryMaterialResponse);
  rpc DeleteCourseSupplementaryMaterialAdmin(DeleteCourseSupplementaryMaterialRequest) returns (DeleteCourseSupplementaryMaterialResponse);
  rpc GetCourseSupplementaryMaterialAdmin(GetCourseSupplementaryMaterialRequest) returns (GetCourseSupplementaryMaterialResponse);

  rpc CreateResourcePackAdmin(CreateResourcePackRequest) returns (ResourcePack);
  rpc UpdateResourcePackAdmin(UpdateResourcePackRequest) returns (ResourcePack);
  rpc DeleteResourcePackAdmin(DeleteResourcePackRequest) returns (DeleteResourcePackResponse);
  rpc GetResourcePackAdmin(GetResourcePackRequest) returns (ResourcePack);
  rpc ListResourcePacksAdmin(ListResourcePacksRequest) returns (ListResourcePacksResponse);

  rpc CreateResourcePackFileAdmin(CreateResourcePackFileRequest) returns (ResourcePackFile);
  rpc UpdateResourcePackFileAdmin(UpdateResourcePackFileRequest) returns (ResourcePackFile);
  rpc DeleteResourcePackFileAdmin(DeleteResourcePackFileRequest) returns (DeleteResourcePackFileResponse);
  rpc GetResourcePackFileAdmin(GetResourcePackFileRequest) returns (ResourcePackFile);
  rpc ListResourcePackFilesAdmin(ListResourcePackFilesRequest) returns (ListResourcePackFilesResponse);
  rpc UpdateResourcePackFileThumbnailAdmin(UpdateResourcePackFileThumbnailRequest) returns (ResourcePackFile);

  // ==========================================
  // 2. 考生端接口 (Candidate-facing APIs - check candidateUlid & Casdoor permissions)
  // ==========================================
  rpc GetCourseSummary(GetCourseSummaryCandidateRequest) returns (GetCourseSummaryResponse);
  rpc GetCourseDetail(GetCourseDetailCandidateRequest) returns (GetCourseDetailResponse);
  rpc ListCourses(ListCoursesCandidateRequest) returns (ListCoursesResponse);
  rpc GetCourseMaterial(GetCourseMaterialCandidateRequest) returns (GetCourseMaterialResponse);
  rpc GetCourseMaterialDetail(GetCourseMaterialCandidateRequest) returns (GetCourseMaterialDetailResponse);
  rpc ListCourseMaterials(ListCourseMaterialsCandidateRequest) returns (ListCourseMaterialsResponse);
  rpc GetChapter(GetChapterCandidateRequest) returns (GetChapterResponse);
  rpc GetChapterDetail(GetChapterDetailCandidateRequest) returns (GetChapterDetailResponse);
  rpc ListChapters(ListChaptersCandidateRequest) returns (ListChaptersResponse);
  rpc GetLesson(GetLessonCandidateRequest) returns (GetLessonResponse);
  rpc GetLessonDetail(GetLessonDetailCandidateRequest) returns (GetLessonDetailResponse);
  rpc ListLessons(ListLessonsCandidateRequest) returns (ListLessonsResponse);
  rpc ListLessonsByCourse(ListLessonsByCourseCandidateRequest) returns (ListLessonsByCourseResponse);
  rpc GetCompleteCourse(GetCompleteCourseCandidateRequest) returns (GetCompleteCourseResponse);
  rpc GetQuiz(GetQuizCandidateRequest) returns (GetQuizResponse);
  rpc ListQuizzes(ListQuizzesCandidateRequest) returns (ListQuizzesResponse);
  rpc CreateViewURL(CreateViewURLCandidateRequest) returns (CreateViewURLResponse);
  rpc GetLessonVideoPlayURL(GetLessonVideoPlayURLRequest) returns (GetLessonVideoPlayURLResponse);
  rpc GetResourcePackFileViewURL(GetResourcePackFileViewURLRequest) returns (GetResourcePackFileViewURLResponse);
  rpc ListResourcePacks(ListResourcePacksCandidateRequest) returns (ListResourcePacksResponse);
  rpc ListResourcePackFiles(ListResourcePackFilesCandidateRequest) returns (ListResourcePackFilesResponse);

  // 考生作答与交互型接口 (已经带 candidate_id，仅需补充 Casdoor / 选课校验)
  rpc CompleteLessonLearning(CompleteLessonLearningRequest) returns (CompleteLessonLearningResponse);
  rpc TakeQuiz(TakeQuizRequest) returns (TakeQuizResponse);
  rpc GetCandidateQuizPaper(GetCandidateQuizPaperRequest) returns (GetCandidateQuizPaperResponse);
  rpc SubmitQuiz(SubmitQuizRequest) returns (SubmitQuizResponse);
  rpc ListCandidateEnrollments(ListCandidateEnrollmentsRequest) returns (ListCandidateEnrollmentsResponse);
  rpc GetCandidateEnrollmentDetail(GetCandidateEnrollmentDetailRequest) returns (GetCandidateEnrollmentDetailResponse);

  rpc AdminPurgeCandidateCourses(AdminPurgeCandidateCoursesRequest) returns (AdminPurgeCandidateCoursesResponse);
}

// 课程实体（支持版本化：每次编辑生成新版本，发布后旧版本标记为Deprecated）
message Course {
  string course_id = 1;             // 课程版本唯一ID (ULID)，每次编辑生成新ID
  string category_tips = 2;         // 分类提示，客户端按相同值分组展示，最长64字符
  string title = 3;                 // 课程标题
  string description = 4;           // 课程简介
  string thumbnail_object_key = 5;  // 课程封面图S3对象key
  uint32 duration_min = 6;          // 课程总时长（分钟），仅用于展示
  bool certification_enabled = 7;   // 是否启用结课认证
  string certification_def_id = 8;  // 资格定义ID，关联外部认证系统
  bool is_published = 9;            // 是否已发布（status=Active时为true，派生字段）
  string published_at = 10;         // 发布时间 (UTC, RFC3339)
  uint32 version = 11;              // 乐观锁版本号，每次更新递增
  string created_at = 12;           // 创建时间 (UTC, RFC3339)
  string updated_at = 13;           // 更新时间 (UTC, RFC3339)
  string course_gpath = 14;         // 业务唯一路径，跨版本保持不变，同一课程的所有版本共享
  string status = 15;               // 版本状态：Draft(草稿)/Active(已激活)/Deprecated(已废弃)
  bool is_current = 16;             // 是否为当前生效版本（同一course_guid下仅一个为true）
  string thumbnail_file_hash = 17;  // 课程封面图SHA256哈希
  string respath = 18;              // Casdoor 权限资源路径
}

// 课程资料（附加于课程级别的教学资料，如教材、课件、参考文档等）
message CourseMaterial {
  string material_id = 1;        // 资料唯一ID (ULID)
  string course_id = 2;          // 所属课程ID
  string title = 3;              // 资料标题
  MaterialType material_type = 4; // 资料类型
  string description = 5;        // 资料描述
  string file_object_key = 6;    // 文件S3对象key
  uint64 file_size = 7;          // 文件大小（字节）
  uint32 sort_order = 8;         // 排序序号，决定展示顺序
  uint32 version = 9;            // 乐观锁版本号
  string created_at = 10;        // 创建时间 (UTC, RFC3339)
  string updated_at = 11;        // 更新时间 (UTC, RFC3339)
  string file_hash = 12;         // 资料文件SHA256哈希
}

// 章节（课程的结构化分组，一个课程至少含一个章节才能发布）
message Chapter {
  string chapter_id = 1;  // 章节唯一ID (ULID)
  string course_id = 2;   // 所属课程ID
  string title = 3;       // 章节标题
  uint32 sort_order = 4;  // 排序序号，决定章节在课程内的展示顺序
  uint32 version = 5;     // 乐观锁版本号
  string created_at = 6;  // 创建时间 (UTC, RFC3339)
  string updated_at = 7;  // 更新时间 (UTC, RFC3339)
}

// 课时（章节内的最小学习单元，支持视频、文本、PDF、图片、音频、文件、链接等多种类型）
message Lesson {
  string lesson_id = 1;         // 课时唯一ID (ULID)
  string chapter_id = 2;        // 所属章节ID
  string title = 3;             // 课时标题
  uint32 sort_order = 4;        // 排序序号，决定课时在章节内的展示顺序
  LessonType lesson_type = 5;   // 课时类型，决定哪些内容字段生效
  string body = 6;              // 文本内容（lesson_type=text时使用，可含富文本/HTML）
  string media_object_key = 7;  // 媒体文件S3对象key（video/pdf/image/audio/file类型时使用）
  string external_url = 8;      // 外部链接URL（lesson_type=link时使用）
  string video_provider = 9;    // 视频提供商：cloudflare/youtube/other
  string video_stream_uid = 10; // 视频流在提供商平台的唯一标识
  string video_embed_code = 11; // 视频嵌入代码（与provider+uid二选一）
  string meta_json = 12;        // 扩展元数据JSON，用于自定义扩展字段
  uint32 version = 13;          // 乐观锁版本号
  string created_at = 14;       // 创建时间 (UTC, RFC3339)
  string updated_at = 15;       // 更新时间 (UTC, RFC3339)
  string media_file_hash = 16;  // 媒体文件SHA256哈希
}

// 前置条件（定义学习顺序约束：实体A必须完成/通过后，实体B才可访问）
message Prerequisite {
  string prerequisite_id = 1;            // 前置条件唯一ID (ULID)
  EntityType required_entity_type = 2;   // 前置实体类型（必须完成/通过的实体）
  string required_entity_id = 3;         // 前置实体ID
  PrerequisiteResult required_result = 4; // 前置要求结果：completed(已完成)/passed(已通过)
  EntityType target_entity_type = 5;     // 目标实体类型（被约束的实体）
  string target_entity_id = 6;           // 目标实体ID
  uint32 version = 7;                    // 乐观锁版本号
  string created_at = 8;                 // 创建时间 (UTC, RFC3339)
  string updated_at = 9;                 // 更新时间 (UTC, RFC3339)
}

// 测验/考试（可附加到课程、章节或课时，由quizzable_type决定挂载位置）
message Quiz {
  reserved 8, 9;
  string quiz_id = 1;                // 测验唯一ID (ULID)
  QuizzableType quizzable_type = 2;  // 所属实体类型：lesson/chapter/course
  string quizzable_id = 3;           // 所属实体ID（课时ID/章节ID/课程ID）
  string title = 4;                  // 测验标题
  string description = 5;            // 测验说明/答题指引
  uint32 passing_score = 6;          // 及格分数（百分比 0-100，默认70）
  uint32 time_limit = 7;             // 时间限制（分钟，0表示不限时）
  // uint32 max_attempts = 8;           // 最大尝试次数（0表示不限次） (removed)
  // bool allow_retake = 9;             // 是否允许通过后重考（默认true） (removed)
  bool randomize_questions = 10;     // 是否随机排列题目顺序
  uint32 version = 12;               // 乐观锁版本号
  string created_at = 13;            // 创建时间 (UTC, RFC3339)
  string updated_at = 14;            // 更新时间 (UTC, RFC3339)
}

// 测验题目
message QuizQuestion {
  string question_id = 1;            // 题目唯一ID (ULID)
  string quiz_id = 2;                // 所属测验ID
  string question_text = 3;          // 题目内容/题干
  QuizQuestionType question_type = 4; // 题目类型：single_choice(单选)/multiple_choice(多选)/true_false(判断)
  uint32 points = 5;                 // 分值（默认1）
  uint32 sort_order = 6;             // 排序序号，决定题目在测验内的展示顺序
  bool is_required = 7;              // 是否必答（默认true）
  string media_items_json = 8;       // 媒体附件JSON数组（图片等）
  uint32 version = 9;                // 乐观锁版本号
  string created_at = 10;            // 创建时间 (UTC, RFC3339)
  string updated_at = 11;            // 更新时间 (UTC, RFC3339)
}

// 测验选项（题目的可选答案）
message QuizOption {
  string option_id = 1;    // 选项唯一ID (ULID)
  string question_id = 2;  // 所属题目ID
  string option_text = 3;  // 选项内容
  bool is_correct = 4;     // 是否为正确答案（单选仅一个correct，多选可多个）
  uint32 sort_order = 5;   // 排序序号，决定选项展示顺序
  uint32 version = 6;      // 乐观锁版本号
  string created_at = 7;   // 创建时间 (UTC, RFC3339)
  string updated_at = 8;   // 更新时间 (UTC, RFC3339)
}

// 排序项（用于批量重排序请求）
message ReorderItem {
  string entity_id = 1;  // 被排序的实体ID
  uint32 sort_order = 2; // 新的排序序号
  uint32 version = 3;    // 乐观锁版本号
}

// S3存储桶对象
message BucketObject {
  string bucket_name = 1;  // 存储桶名称
  string object_key = 2;   // 对象key
  uint64 file_size = 3;    // 文件大小（字节）
  string last_modified = 4; // 最后修改时间 (UTC, RFC3339)
}

// ==================== 课程 RPC messages ====================

message CreateCourseDraftRequest {
  string category_tips = 1;        // 分类提示，客户端按相同值分组展示，最长64字符
  string title = 2;                // 课程标题 ([required])
  string description = 3;          // 课程简介
  string thumbnail_object_key = 4; // 课程封面图S3对象key
  uint32 duration_min = 5;         // 课程总时长（分钟）
  bool certification_enabled = 6;  // 是否启用结课认证
  string certification_def_id = 7; // 资格定义ID
  reserved 8;                      // from_course_guid (deprecated)
  string course_id = 9;            // 外部指定的课程版本ID ULID ([required])
  string course_gpath = 10;        // 外部指定的课程业务唯一路径 ([required])
  string thumbnail_file_hash = 11; // 课程封面图SHA256哈希
  string respath = 12;             // Casdoor 权限资源路径
}

message DuplicateCourseDraftRequest {
  string from_course_id = 1; // 数据源 course_id (特定版本唯一ID) [required]
  string course_id = 2;      // 新的 course_id ULID (新草稿版本ID) [required]
  string title = 3;          // 新的课程标题 [required]
}

message UpdateCourseRequest {
  string course_id = 1;            // 课程版本ID ([required])
  string category_tips = 2;        // 分类提示，客户端按相同值分组展示，最长64字符
  string title = 3;                // 课程标题 ([required])
  string description = 4;          // 课程简介
  string thumbnail_object_key = 5; // 课程封面图S3对象key
  uint32 duration_min = 6;         // 课程总时长（分钟）
  bool certification_enabled = 7;  // 是否启用结课认证（已发布课程不可修改）
  string certification_def_id = 8; // 资格定义ID（已发布课程不可修改）
