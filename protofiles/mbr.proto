syntax = "proto3";

package gmbr;

option go_package = "cftp/gmbr";

service GmbrService {
  // === 会员方案（纯身份查询）===
  rpc ListMemberships(ListMembershipsRequest) returns (ListMembershipsResponse);
  rpc GetMembership(GetMembershipRequest) returns (Membership);

  // === 用户会员查询 ===
  rpc GetActiveMembership(GetActiveMembershipRequest) returns (GetActiveMembershipResponse);
  rpc ListUserMemberships(ListUserMembershipsRequest) returns (ListUserMembershipsResponse);

  // === 缴费记录 ===
  rpc ListMembershipBillings(ListMembershipBillingsRequest) returns (ListMembershipBillingsResponse);

  // === 生命周期（由 gmall 调用）===
  rpc ActivateMembership(ActivateMembershipRequest) returns (ActivateMembershipResponse);
  rpc CancelMembership(CancelMembershipRequest) returns (CancelMembershipResponse);

  // === 管理员 ===
  rpc AdminGrantMembership(AdminGrantMembershipRequest) returns (AdminGrantMembershipResponse);
  rpc AdminRevokeMembership(AdminRevokeMembershipRequest) returns (AdminRevokeMembershipResponse);
  rpc AdminCreateMembershipConfig(AdminCreateMembershipConfigRequest) returns (AdminCreateMembershipConfigResponse);
  rpc AdminUpdateMembershipConfig(AdminUpdateMembershipConfigRequest) returns (AdminUpdateMembershipConfigResponse);

  rpc AdminPurgeCandidateMembership(AdminPurgeCandidateMembershipRequest) returns (AdminPurgeCandidateMembershipResponse);

  // === 会员邮件管理 ===
  rpc ListMembershipMails(ListMembershipMailsRequest) returns (ListMembershipMailsResponse);
  rpc GetMembershipMailDetail(GetMembershipMailDetailRequest) returns (GetMembershipMailDetailResponse);
  rpc RetryMembershipMail(RetryMembershipMailRequest) returns (RetryMembershipMailResponse);
  rpc IgnoreMembershipMail(IgnoreMembershipMailRequest) returns (IgnoreMembershipMailResponse);
}

// ==========================================
// 实体消息定义
// ==========================================

message Membership {
  string membership_ulid = 1;
  string name = 2;
  string description = 3;
  string features_json = 4;
  string ideal_for = 5;
  int32  duration_in_months = 6;
  string casdoor_role_name = 7;
  int32  tier_level = 8;
  string course_discount_coupon = 9;
  int32  sort_order = 10;
  string created_at = 11;
  string updated_at = 12;
  string membership_gpath = 13;
  int32  version = 14;
  string status = 15;
  bool   is_current = 16;
}

message UserMembership {
  string membership_record_id = 1;
  string candidate_ulid = 2;
  string membership_ulid = 3;
  string membership_order_ulid = 4;
  string bundle_order_ulid = 5;
  string stripe_subscription_id = 6;
  string stripe_price_id = 7;
  string started_at = 8;
  string expires_at = 9;
  string next_billing_at = 10;
  string status = 11;
  bool   auto_renew = 12;
  string source = 13;
  string previous_membership_record_id = 14;
  string cancelled_at = 15;
  string cancellation_reason = 16;
  string grace_period_ends_at = 17;
  int32  renewal_count = 18;
  int64  total_revenue_minor = 19;
  int32  failed_payment_count = 20;
  string last_payment_at = 21;
  int64  last_payment_amount_minor = 22;
  string admin_notes = 23;
  string created_at = 24;
  string updated_at = 25;
}

message MembershipBilling {
  string billing_record_id = 1;
  string membership_record_id = 2;
  string candidate_ulid = 3;
  string billing_type = 4;
  string gpay_order_ulid = 5;
  string stripe_invoice_id = 6;
  int64  amount_minor = 7;
  string currency = 8;
  string period_start = 9;
  string period_end = 10;
  string status = 11;
  string paid_at = 12;
  string created_at = 13;
}

// ==========================================
// 请求与响应消息定义
// ==========================================

message ListMembershipsRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListMembershipsResponse {
  repeated Membership memberships = 1;
  int32 total = 2;
}

message GetMembershipRequest {
  string membership_ulid = 1;
}

message GetActiveMembershipRequest {
  string candidate_ulid = 1;
}

message GetActiveMembershipResponse {
  UserMembership membership = 1;
  string course_discount_coupon = 2;
}

message ListUserMembershipsRequest {
  string candidate_ulid = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListUserMembershipsResponse {
  repeated UserMembership user_memberships = 1;
  int32 total = 2;
}

message ListMembershipBillingsRequest {
  string candidate_ulid = 1;
  string membership_record_id = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message ListMembershipBillingsResponse {
  repeated MembershipBilling billings = 1;
  int32 total = 2;
}

message ActivateMembershipRequest {
  string candidate_ulid = 1;
  string membership_gpath = 2;
  int32  duration_months = 3;
  string stripe_subscription_id = 4;
  string stripe_price_id = 5;
  string bundle_order_ulid = 6;
  string membership_order_ulid = 7;
  string stripe_invoice_id = 8;
  int64  amount_minor = 9;
  string currency = 10;
  string gpay_order_ulid = 11;
}

message ActivateMembershipResponse {
  bool success = 1;
  string membership_record_id = 2;
}

message CancelMembershipRequest {
  string membership_record_id = 1;
  string reason = 2;
}

message CancelMembershipResponse {
  bool success = 1;
}

message AdminGrantMembershipRequest {
  string candidate_ulid = 1;
  string membership_gpath = 2;
  int32  duration_months = 3;
  string admin_notes = 4;
}

message AdminGrantMembershipResponse {
  bool success = 1;
  string membership_record_id = 2;
}

message AdminRevokeMembershipRequest {
  string membership_record_id = 1;
  string reason = 2;
  string admin_notes = 3;
}

message AdminRevokeMembershipResponse {
  bool success = 1;
}

message AdminCreateMembershipConfigRequest {
  string membership_ulid = 1;         // 客户端指定的物理版本 ID (ULID)
  string membership_gpath = 2;      // 人类可读的逻辑路径，例如 "/mbr/aff"
  string name = 3;
  string description = 4;
  string features_json = 5;
  string ideal_for = 6;
  int32  duration_in_months = 7;
  string casdoor_role_name = 8;
  int32  tier_level = 9;
  string course_discount_coupon = 10;
  int32  sort_order = 11;
}

message AdminCreateMembershipConfigResponse {
  bool success = 1;
  string message = 2;
}

message AdminUpdateMembershipConfigRequest {
  string new_membership_ulid = 1;     // 客户端为此新版本指定的物理 ID (ULID)
  string membership_gpath = 2;      // 要更新的逻辑路径
  string name = 3;
  string description = 4;
  string features_json = 5;
  string ideal_for = 6;
  int32  duration_in_months = 7;
  string casdoor_role_name = 8;
  int32  tier_level = 9;
  string course_discount_coupon = 10;
  int32  sort_order = 11;
  string status = 12;              // 允许设为 Deprecated
}

message AdminUpdateMembershipConfigResponse {
  bool success = 1;
  string message = 2;
}

message AdminPurgeCandidateMembershipRequest {
  string candidate_ulid = 1;      // candidate ULID [required]
  string bundle_order_ulid = 2;   // bundle order ULID [required]
  string admin_id = 3;            // admin ID [required]
}

message AdminPurgeCandidateMembershipResponse {
  bool success = 1;
  string message = 2;
}

message ListMembershipMailsRequest {
  optional string candidate_ulid = 1;
  optional string task_status = 2;
  optional string notification_type = 3;
  uint32 page = 4;
  uint32 page_size = 5;
}

message MembershipMailItem {
  string mail_id = 1;
  string candidate_ulid = 2;
  string membership_record_id = 3;
  string notification_type = 4;
  string to_email = 5;
  string to_name = 6;
  string subject = 7;
  string task_status = 8;
  int32 retry_count = 9;
  string manual_by = 10;
  string error_code = 11;
  string error_message = 12;
  string reference_id = 13;
  string created_at = 14;
  string updated_at = 15;
}

message ListMembershipMailsResponse {
  repeated MembershipMailItem mails = 1;
  uint32 total = 2;
}

message GetMembershipMailDetailRequest {
  string mail_id = 1;
}

message GetMembershipMailDetailResponse {
  MembershipMailItem mail = 1;
  string payload_json = 2;
}

message RetryMembershipMailRequest {
  string mail_id = 1;
  string admin_id = 2;
  optional string override_recipient_email = 3;
  optional string override_payload_json = 4;
}

message RetryMembershipMailResponse {
  string new_mail_id = 1;
  string status = 2;
}

message IgnoreMembershipMailRequest {
  string mail_id = 1;
  string admin_id = 2;
}

message IgnoreMembershipMailResponse {
  string mail_id = 1;
  string status = 2;
}

