syntax = "proto3";

package gmall;

option go_package = "cftp/gmall";

service MallService {
  // === Bundle 管理 ===
  rpc CreateBundle(CreateBundleRequest) returns (CreateBundleResponse);
  rpc UpdateBundleMeta(UpdateBundleMetaRequest) returns (UpdateBundleResponse);
  rpc UpdateBundlePricing(UpdateBundlePricingRequest) returns (UpdateBundleResponse);
  rpc GetBundle(GetBundleRequest) returns (GetBundleResponse);
  rpc ListBundles(ListBundlesRequest) returns (ListBundlesResponse);

  // === Bundle 购买（唯一顶层入口） ===
  rpc CreateBundleOrder(CreateBundleOrderRequest) returns (CreateBundleOrderResponse);
  rpc GetBundleOrderSummary(GetBundleOrderSummaryRequest) returns (GetBundleOrderSummaryResponse);
  rpc GetBundleOrderDetail(GetBundleOrderDetailRequest) returns (GetBundleOrderDetailResponse);
  rpc ListBundleOrders(ListBundleOrdersRequest) returns (ListBundleOrdersResponse);

  // Sync and re-evaluate pipeline order exemptions.
  rpc SyncPipelineOrderExemptions(SyncPipelineOrderExemptionsRequest) returns (SyncPipelineOrderExemptionsResponse);

  // Candidate creates a stage order in gmall.
  rpc CreateStageOrder(CreateStageOrderRequest) returns (CreateStageOrderResponse);

  // Candidate selects stage exemptions in gmall.
  rpc SelectStageExemptions(SelectStageExemptionsRequest) returns (SelectStageExemptionsResponse);

  // Candidate creates a course retake order in gmall.
  rpc CreateCourseRetakeOrder(CreateCourseRetakeOrderRequest) returns (CreateCourseRetakeOrderResponse);

  // Query a pipeline order by its logical order ULID.
  rpc GetPipelineOrderStatus(GetPipelineOrderStatusRequest) returns (GetPipelineOrderStatusResponse);

  // Query a stage order by its logical order ULID.
  rpc GetStageOrderStatus(GetStageOrderStatusRequest) returns (GetStageOrderStatusResponse);

  // Query a course retake order by its logical order ULID.
  rpc GetCourseRetakeOrderStatus(GetCourseRetakeOrderStatusRequest) returns (GetCourseRetakeOrderStatusResponse);

  // Query whether a stage candidate action is already completed.
  rpc GetStageCandidateActionStatus(GetStageCandidateActionStatusRequest) returns (GetStageCandidateActionStatusResponse);

  // Query whether a course-unit retake payment is already completed.
  rpc GetCourseUnitRetakePaymentStatus(GetCourseUnitRetakePaymentStatusRequest) returns (GetCourseUnitRetakePaymentStatusResponse);

  // Admin ignores a failed mail task.
  rpc IgnoreMailTask(IgnoreMailTaskRequest) returns (IgnoreMailTaskResponse);

  // Admin resends a failed mail task.
  rpc ResendMailTask(ResendMailTaskRequest) returns (ResendMailTaskResponse);

  // Candidate decides to pay for a business order.
  rpc InitiatePayment(InitiatePaymentRequest) returns (InitiatePaymentResponse);

  // Preview payment details with coupon code calculation.
  rpc PreviewPayment(PreviewPaymentRequest) returns (PreviewPaymentResponse);


  // --- New Query RPCs ---
  rpc GetOrderSummary(GetOrderSummaryRequest) returns (GetOrderSummaryResponse);
  rpc GetOrderDetail(GetOrderDetailRequest) returns (GetOrderDetailResponse);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);

  rpc GetPipelineOrderSummary(GetPipelineOrderSummaryRequest) returns (GetPipelineOrderSummaryResponse);
  rpc GetPipelineOrderDetail(GetPipelineOrderDetailRequest) returns (GetPipelineOrderDetailResponse);
  rpc ListPipelineOrders(ListPipelineOrdersRequest) returns (ListPipelineOrdersResponse);

  rpc GetStageOrderSummary(GetStageOrderSummaryRequest) returns (GetStageOrderSummaryResponse);
  rpc GetStageOrderDetail(GetStageOrderDetailRequest) returns (GetStageOrderDetailResponse);
  rpc ListStageOrders(ListStageOrdersRequest) returns (ListStageOrdersResponse);

  rpc GetCourseRetakeOrderSummary(GetCourseRetakeOrderSummaryRequest) returns (GetCourseRetakeOrderSummaryResponse);
  rpc GetCourseRetakeOrderDetail(GetCourseRetakeOrderDetailRequest) returns (GetCourseRetakeOrderDetailResponse);
  rpc ListCourseRetakeOrders(ListCourseRetakeOrdersRequest) returns (ListCourseRetakeOrdersResponse);

  rpc GetMailTaskSummary(GetMailTaskSummaryRequest) returns (GetMailTaskSummaryResponse);
  rpc GetMailTaskDetail(GetMailTaskDetailRequest) returns (GetMailTaskDetailResponse);
  rpc ListMailTasks(ListMailTasksRequest) returns (ListMailTasksResponse);

  rpc GetNatsMessageSummary(GetNatsMessageSummaryRequest) returns (GetNatsMessageSummaryResponse);
  rpc GetNatsMessageDetail(GetNatsMessageDetailRequest) returns (GetNatsMessageDetailResponse);
  rpc ListNatsMessages(ListNatsMessagesRequest) returns (ListNatsMessagesResponse);

  // Candidate creates a pipeline unlock order.
  rpc CreatePipelineUnlockOrder(CreatePipelineUnlockOrderRequest) returns (CreatePipelineUnlockOrderResponse);

  rpc GetPipelineUnlockOrderSummary(GetPipelineUnlockOrderSummaryRequest) returns (GetPipelineUnlockOrderSummaryResponse);
  rpc GetPipelineUnlockOrderDetail(GetPipelineUnlockOrderDetailRequest) returns (GetPipelineUnlockOrderDetailResponse);
  rpc ListPipelineUnlockOrders(ListPipelineUnlockOrdersRequest) returns (ListPipelineUnlockOrdersResponse);

  // Candidate creates a credential application order.
  rpc CreateCredentialApplicationOrder(CreateCredentialApplicationOrderRequest) returns (CreateCredentialApplicationOrderResponse);

  rpc GetCredentialApplicationOrderSummary(GetCredentialApplicationOrderSummaryRequest) returns (GetCredentialApplicationOrderSummaryResponse);
  rpc GetCredentialApplicationOrderDetail(GetCredentialApplicationOrderDetailRequest) returns (GetCredentialApplicationOrderDetailResponse);
  rpc ListCredentialApplicationOrders(ListCredentialApplicationOrdersRequest) returns (ListCredentialApplicationOrdersResponse);

  // Candidate checks whether they are eligible to purchase a pipeline.
  // Returns ALL blockers at once, not just the first one encountered.
  rpc CheckPipelineEligibility(CheckPipelineEligibilityRequest) returns (CheckPipelineEligibilityResponse);

  rpc AdminPurgeCandidateBundle(AdminPurgeCandidateBundleRequest) returns (AdminPurgeCandidateBundleResponse);

  rpc CreateBundleUploadURL(CreateBundleUploadURLRequest) returns (CreateBundleUploadURLResponse);
  rpc GetBundleThumbnailURL(GetBundleThumbnailURLRequest) returns (GetBundleThumbnailURLResponse);
}

message CreatePipelineOrderRequest {
  string candidate_ulid = 1; // candidate ULID [required]
  string pipeline_cc_ulid = 2; // pipeline type ULID in gcc [required]
  string payment_mode = 3; // FULL_PIPELINE or BY_STAGE [required]
  string candidate_selected_exemptions_json = 4; // candidate selected exemptions JSON [required]
}

message CreatePipelineOrderResponse {
  string pipeline_order_ulid = 1; // pipeline order ULID [required]
  string order_status = 2; // current pipeline order status [required]
  string pipeline_pay_order_ulid = 4; // pipeline payment order ULID [optional]
  string payment_key = 5; // Stripe client secret or hosted checkout URL [optional]
  bool reused_existing = 6; // whether an in-progress order was reused [required]
  string message = 7; // human-readable message [required]
}

message SyncPipelineOrderExemptionsRequest {
  string pipeline_order_ulid = 1; // pipeline order ULID [required]
}

message SyncPipelineOrderExemptionsResponse {
  string pipeline_order_ulid = 1; // pipeline order ULID [required]
  string final_exemptions_json = 2; // evaluated final exemptions JSON [required]
  string order_status = 3; // current pipeline order status [required]
  string message = 4; // human-readable message [required]
}

message CreateStageOrderRequest {
  string candidate_ulid = 1; // candidate ULID [required]
  string pipeline_cc_ulid = 2; // pipeline type ULID in gcc [required]
  string pipeline_order_ulid = 3; // related pipeline order ULID [optional]
  string stage_ulid = 4; // stage instance ULID if already exists [optional]
  string stage_cc_ulid = 5; // stage type ULID in gcc [required]
}

message CreateStageOrderResponse {
  string stage_order_ulid = 1; // stage order ULID [required]
  string order_status = 2; // current stage order status [required]
  string stage_pay_order_ulid = 4; // stage payment order ULID [optional]
  string payment_key = 5; // Stripe client secret or hosted checkout URL [optional]
  bool reused_existing = 6; // whether an in-progress order was reused [required]
  string message = 7; // human-readable message [required]
}

message SelectStageExemptionsRequest {
  string stage_order_ulid = 1; // stage order ULID [required]
  string exemptions_json = 2; // candidate selected exemptions JSON [required]
}

message SelectStageExemptionsResponse {
  string stage_order_ulid = 1; // stage order ULID [required]
  string order_status = 2; // current stage order status [required]
  string stage_pay_order_ulid = 3; // stage payment order ULID [optional]
  string message = 4; // human-readable message [required]
}

message CreateCourseRetakeOrderRequest {
  string course_unit_ulid = 1; // course unit instance ULID [required]
  string course_unit_cc_ulid = 2; // course unit type ULID in gcc [required]
  string candidate_ulid = 3; // candidate ULID [required]
  uint32 retried_count = 4; // [optional] retried count from gprog; 0 or unset means auto
  string bundle_order_ulid = 5; // bundle order ULID [required]
}

message CreateCourseRetakeOrderResponse {
  string course_retake_order_ulid = 1; // course retake order ULID [required]
  string order_status = 2; // current course retake order status [required]
  string pay_order_ulid = 3; // payment order ULID [required]
  string payment_key = 4; // Stripe client secret or hosted checkout URL [optional]
  bool reused_existing = 5; // whether an in-progress order was reused [required]
  string message = 6; // human-readable message [required]
}

message GetPipelineOrderStatusRequest {
  string pipeline_order_ulid = 1; // pipeline order ULID [required]
}

message GetPipelineOrderStatusResponse {
  bool found = 1; // whether the order exists
  string order_status = 2; // current pipeline order status
  string pipeline_pay_order_ulid = 4; // pipeline payment order ULID
  string payment_key = 5; // Stripe client secret or hosted checkout URL
  string message = 6; // human-readable message
}

message GetStageOrderStatusRequest {
  string stage_order_ulid = 1; // stage order ULID [required]
}

message GetStageOrderStatusResponse {
  bool found = 1; // whether the order exists
  string order_status = 2; // current stage order status
  string stage_pay_order_ulid = 4; // stage payment order ULID
  string payment_key = 5; // Stripe client secret or hosted checkout URL
  string message = 6; // human-readable message
}

message GetCourseRetakeOrderStatusRequest {
  string course_retake_order_ulid = 1; // course retake order ULID [required]
}

message GetCourseRetakeOrderStatusResponse {
  bool found = 1; // whether the order exists
  string order_status = 2; // current course retake order status
  string pay_order_ulid = 3; // payment order ULID
  string payment_key = 4; // Stripe client secret or hosted checkout URL
  string message = 5; // human-readable message
}

message GetStageCandidateActionStatusRequest {
  string pipeline_ulid = 1; // pipeline instance ULID [required]
  string candidate_ulid = 2; // candidate ULID [required]
  string stage_ulid = 3; // stage instance ULID [required]
  string stage_cc_ulid = 4; // stage config type ULID [optional]
}

message GetStageCandidateActionStatusResponse {
  bool found = 1; // whether the corresponding record exists
  bool completed = 2; // whether the stage payment / exemption flow is completed
  bool is_paid = 3; // whether the stage payment is paid or no payment is required
  repeated string exempted_course_unit_cc_ulids = 4; // final exempted course unit cc ulids
  string message = 5; // human-readable message
}

message GetCourseUnitRetakePaymentStatusRequest {
  string bundle_order_ulid = 1; // bundle order ULID [required]
  string course_unit_cc_ulid = 2; // course unit type ULID in gcc [required]
  uint32 retried_count = 3; // retried count [required]
}

message GetCourseUnitRetakePaymentStatusResponse {
  bool found = 1; // whether the corresponding record exists
  bool paid = 2; // whether the retake payment is completed
  string message = 3; // human-readable message
}

message IgnoreMailTaskRequest {
  string mail_task_ulid = 1; // mail task ULID [required]
  string admin_id = 2; // operator admin ID [required]
}

message IgnoreMailTaskResponse {
  string mail_task_ulid = 1; // mail task ULID [required]
  string task_status = 2; // updated status, for example IGNORED [required]
  string message = 3; // human-readable message [required]
}

message ResendMailTaskRequest {
  string mail_task_ulid = 1; // mail task ULID [required]
  string admin_id = 2; // operator admin ID [required]
  bool use_new_email = 3; // whether to use the candidate latest email [required]
  optional string override_recipient_email = 4; // [optional] custom recipient email
  optional string override_template_params_json = 5; // [optional] custom template parameters JSON
}

message ResendMailTaskResponse {
  string mail_task_ulid = 1; // original mail task ULID [required]
  string task_status = 2; // updated status, for example RESEND [required]
  string message = 3; // human-readable message [required]
}

