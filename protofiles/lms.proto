  bool is_published = 8;            // 是否已发布
  string published_at = 9;         // 发布时间 (UTC, RFC3339)
  uint32 version = 10;              // 乐观锁版本号
  string created_at = 11;           // 创建时间 (UTC, RFC3339)
  string updated_at = 12;           // 更新时间 (UTC, RFC3339)
  string course_gpath = 13;          // 业务唯一路径
  string status = 14;               // 版本状态
  bool is_current = 15;             // 是否为当前生效版本
  string thumbnail_file_hash = 16;  // 课程封面图SHA256哈希
